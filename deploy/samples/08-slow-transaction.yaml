---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sp-slow-transaction-script
  namespace: signalpilot-test
data:
  app.py: |
    import http.server, time, random, threading

    # Prometheus metrics counters (simple text/plain exposition)
    _request_count = 0
    _slow_count = 0
    _lock = threading.Lock()

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            global _request_count, _slow_count
            if self.path == "/metrics":
                with _lock:
                    rc = _request_count
                    sc = _slow_count
                body = (
                    "# HELP http_requests_total Total HTTP requests\n"
                    "# TYPE http_requests_total counter\n"
                    f"http_requests_total {rc}\n"
                    "# HELP http_slow_requests_total Slow HTTP requests (>1s)\n"
                    "# TYPE http_slow_requests_total counter\n"
                    f"http_slow_requests_total {sc}\n"
                    "# HELP http_request_duration_seconds Last request duration\n"
                    "# TYPE http_request_duration_seconds gauge\n"
                    f"http_request_duration_seconds {2.1 if sc > 0 else 0.05}\n"
                ).encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(body)
                return

            with _lock:
                _request_count += 1

            # 20% of requests are artificially slow (p95 spike simulation)
            if random.random() < 0.20:
                with _lock:
                    _slow_count += 1
                print(f"WARN slow transaction: sleeping 2.1s (request #{_request_count})", flush=True)
                time.sleep(2.1)
            self.send_response(200)
            self.end_headers()
            self.wfile.write(b"OK")

        def log_message(self, *args): pass

    print("INFO sp-test-slow starting on :8080 with /metrics", flush=True)
    http.server.HTTPServer(("", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sp-test-slow
  namespace: signalpilot-test
  labels:
    app: sp-test-slow
    scenario: slow-transaction
    app.kubernetes.io/version: "v2.0.0-slow"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sp-test-slow
  template:
    metadata:
      labels:
        app: sp-test-slow
        scenario: slow-transaction
    spec:
      volumes:
      - name: script
        configMap:
          name: sp-slow-transaction-script
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python3", "/scripts/app.py"]
        volumeMounts:
        - name: script
          mountPath: /scripts
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: sp-test-slow
  namespace: signalpilot-test
spec:
  selector:
    app: sp-test-slow
  ports:
  - port: 8080
    targetPort: 8080
