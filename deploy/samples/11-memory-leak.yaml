---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sp-memory-leak-script
  namespace: signalpilot-test
data:
  app.py: |
    import time, sys

    leak = []
    while True:
        leak.append(b'x' * 10 * 1024 * 1024)  # 10 MB every 5s
        used = sum(len(b) for b in leak)
        print(f"INFO allocated {used // (1024 * 1024)}MB total", flush=True)
        time.sleep(5)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sp-test-memory-leak
  namespace: signalpilot-test
  labels:
    app: sp-test-memory-leak
    scenario: memory-leak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sp-test-memory-leak
  template:
    metadata:
      labels:
        app: sp-test-memory-leak
        scenario: memory-leak
    spec:
      volumes:
      - name: script
        configMap:
          name: sp-memory-leak-script
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python3", "/scripts/app.py"]
        volumeMounts:
        - name: script
          mountPath: /scripts
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
