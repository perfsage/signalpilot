---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sp-latency-prometheus-script
  namespace: signalpilot-test
data:
  app.py: |
    import http.server, time, random, threading

    # Manual histogram buckets for p95 demonstration
    _buckets = {0.005: 0, 0.01: 0, 0.025: 0, 0.05: 0, 0.1: 0,
                0.25: 0, 0.5: 0, 1.0: 0, 2.5: 0, 5.0: 0, 10.0: 0}
    _count = 0
    _sum = 0.0
    _lock = threading.Lock()

    def record(duration):
        global _count, _sum
        with _lock:
            _count += 1
            _sum += duration
            for b in sorted(_buckets):
                if duration <= b:
                    _buckets[b] += 1

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/metrics":
                with _lock:
                    lines = [
                        "# HELP http_request_duration_seconds HTTP latency histogram",
                        "# TYPE http_request_duration_seconds histogram",
                    ]
                    cumulative = 0
                    for b in sorted(_buckets):
                        cumulative += _buckets[b]
                        lines.append(f'http_request_duration_seconds_bucket{{le="{b}"}} {cumulative}')
                    lines.append(f'http_request_duration_seconds_bucket{{le="+Inf"}} {_count}')
                    lines.append(f"http_request_duration_seconds_sum {_sum:.4f}")
                    lines.append(f"http_request_duration_seconds_count {_count}")
                body = "\n".join(lines).encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(body)
                return

            start = time.time()
            # 30% of requests are slow (2.5s), making p95 spike above 2s
            if random.random() < 0.30:
                delay = round(random.uniform(2.1, 2.9), 3)
                print(f"WARN p95 latency spike: {delay}s", flush=True)
                time.sleep(delay)
            else:
                time.sleep(0.01)
            elapsed = time.time() - start
            record(elapsed)
            self.send_response(200)
            self.end_headers()
            self.wfile.write(b"OK")

        def log_message(self, *args): pass

    print("INFO sp-test-latency running on :8080 (30% slow requests, /metrics)", flush=True)
    http.server.HTTPServer(("", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sp-test-latency
  namespace: signalpilot-test
  labels:
    app: sp-test-latency
    scenario: latency-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sp-test-latency
  template:
    metadata:
      labels:
        app: sp-test-latency
        scenario: latency-prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      volumes:
      - name: script
        configMap:
          name: sp-latency-prometheus-script
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python3", "/scripts/app.py"]
        volumeMounts:
        - name: script
          mountPath: /scripts
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: sp-test-latency
  namespace: signalpilot-test
spec:
  selector:
    app: sp-test-latency
  ports:
  - port: 8080
    targetPort: 8080
