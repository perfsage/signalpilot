---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sp-git-correlation-script
  namespace: signalpilot-test
data:
  app.py: |
    import http.server, sys

    # Simulates a payment service regression introduced in a specific commit.
    # The git-commit label on the Deployment matches the SHA that introduced
    # the bug, letting SignalPilot trace the regression to a real commit.

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
                return
            try:
                raise AttributeError(
                    "AttributeError: 'NoneType' object has no attribute 'amount' "
                    "at billing.processor.charge_card line 87"
                )
            except Exception as e:
                print(f"ERROR {e}", flush=True)
                self.send_response(500)
                self.end_headers()
                self.wfile.write(b"Internal Server Error")

        def log_message(self, *args): pass

    print("INFO sp-test-git-demo v3.0.0-bad starting", flush=True)
    http.server.HTTPServer(("", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sp-test-git-demo
  namespace: signalpilot-test
  labels:
    app: sp-test-git-demo
    scenario: git-correlation
    app.kubernetes.io/version: "v3.0.0-bad"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sp-test-git-demo
  template:
    metadata:
      labels:
        app: sp-test-git-demo
        scenario: git-correlation
        app.kubernetes.io/version: "v3.0.0-bad"
    spec:
      volumes:
      - name: script
        configMap:
          name: sp-git-correlation-script
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python3", "/scripts/app.py"]
        volumeMounts:
        - name: script
          mountPath: /scripts
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: sp-test-git-demo
  namespace: signalpilot-test
spec:
  selector:
    app: sp-test-git-demo
  ports:
  - port: 8080
    targetPort: 8080
