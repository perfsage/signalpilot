---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalpilot
  namespace: signalpilot-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: signalpilot-reader
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status", "events", "nodes", "services", "endpoints", "namespaces", "replicationcontrollers", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["gadget.kinvolk.io"]
  resources: ["traces"]
  verbs: ["get", "list", "create", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: signalpilot-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: signalpilot-reader
subjects:
- kind: ServiceAccount
  name: signalpilot
  namespace: signalpilot-test
