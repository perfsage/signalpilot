# SignalPilot RBAC – grants read access to the resources SignalPilot needs.
# Apply with: kubectl apply -f deploy/signalpilot-rbac.yaml
#
# TODO (full impl): scope to specific namespaces, add ServiceAccount binding.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalpilot
  namespace: signalpilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: signalpilot-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - configmaps
      - namespaces
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: signalpilot-reader-binding
subjects:
  - kind: ServiceAccount
    name: signalpilot
    namespace: signalpilot
roleRef:
  kind: ClusterRole
  name: signalpilot-reader
  apiGroup: rbac.authorization.k8s.io
